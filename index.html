<!DOCTYPE html>
<html lang="de">
    <head> 

        <meta charset="UTF-8">

        <title>Warren-Fachwerkbrücke</title>

        <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;

            h1 { color: #333; }

            #steuerung {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            }

            #zeichenflaeche {
            background: white;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            }

            #tabelle {
            background: white;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 20px;
            width: 100%;
            box-sizing: border-box;
            }

            #stabTabelle1, #stabTabelle2 {
            width: 50%;
            }

            #stabTabelle1 th, #stabTabelle1 td,
            #stabTabelle2 th, #stabTabelle2 td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            }

            #stabTabelle1 th, #stabTabelle2 th {
            background: #f5f5f5;
            }

            }
        </style>

    </head>

    <body>
        
        <h1>Warren-Fachwerkbrücke – Stabkräfte</h1>

        <div id="steuerung">
            <label for="hoehenregle1">Höhe des Fachwerks:</label>
            <input type="range" id="hoehenregler1" min="1" max="5" value="3.5" step="0.1">
            <span id="hoehenwert">3.5 m</span>

            <label for="personenregler2">Personenanzahl</label>
            <input type="range" id="personenregler2" min="1" max="20" value="4" step="1">
            <span id="personenwert">4</span>
        </div>

        <div id="zeichenflaeche">
            <svg id="fachwerk" width="800" height="300">
            </svg>
        </div>

        <div id="tabelle">
            <table id="stabTabelle1">
                <thead>
                    <tr>
                    <th>Stab</th>
                    <th>Stabkraft [N]</th>
                    <th>Knicklast [N]</th>
                    </tr>
                </thead>
                <tbody id="tabellenKoerper1"></tbody>
            </table>
            <table id="stabTabelle2">
                <thead>
                    <tr>
                    <th>Stab</th>
                    <th>Stabkraft [N]</th>
                    <th>Knicklast [N]</th>
                    </tr>
                </thead>
                <tbody id="tabellenKoerper2"></tbody>
            </table>
        </div>

    <script src="bruecke.js"></script>
    </body>
</html>
